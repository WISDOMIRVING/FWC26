<!doctype html>
<html>
  <head>
    <title>Airdrop Tasks</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="header">
        <img src="image/logo.jpeg" alt="Our logo" width="100px" />
        <h1>$FWC26 Airdrop</h1>
        <p>Complete all steps below to secure your spot</p>
      </div>

      <div class="progress">
        <span id="progressText">0/4 steps completed</span>
        <span id="progressPercent">0%</span>
      </div>

      <div class="tasks">
        <div class="task">
          <h3>Follow Us on X</h3>
          <button onclick="completeTask('followed')">Follow</button>
        </div>

        <div class="task locked" id="likeTask">
          <h3>Like and Retweet Post</h3>
          <button onclick="completeTask('liked')">Like & Retweet</button>
        </div>

        <div class="task locked" id="retweetTask">
          <h3>Follow Us On Facebook</h3>
          <button onclick="completeTask('followed_fb')">Follow</button>
        </div>

        <div class="task locked" id="postTask">
          <h3>Join Our Community</h3>
          <button onclick="completeTask('joined')">Join</button>
        </div>

        <div
          class="task locked"
          id="claimTask"
          style="display: flex; justify-content: center"
        >
          <button onclick="completeTask('claim')">
            Claim Your 5,000 Tokens
          </button>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
